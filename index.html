<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>RSVP | Jay Ibrahim Al Islam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --ink: #f8fafc;
    --paper: #1c150c;
    --gold: #FFF78D;
    --gold-soft: #FFBF00;
    --accent: #c9a84c;
    --line: rgba(255, 191, 0, 0.2);
    --card-bg: rgba(42, 32, 18, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* --- Noise overlay --- */
  .noise-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }

  /* --- Aurora container & orbs --- */
  .aurora-container {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .aurora-orb-1 {
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; left: -150px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(255, 191, 0, 0.15) 0%, rgba(201, 168, 76, 0.03) 55%, transparent 70%);
    animation: drift-1 25s ease-in-out infinite;
    filter: blur(50px);
    will-change: transform;
  }
  .aurora-orb-2 {
    position: absolute;
    width: 700px; height: 600px;
    bottom: -200px; right: -150px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(163, 125, 34, 0.12) 0%, rgba(42, 32, 18, 0.05) 50%, transparent 70%);
    animation: drift-2 30s ease-in-out infinite;
    filter: blur(60px);
    will-change: transform;
  }
  .aurora-orb-3 {
    position: absolute;
    width: 500px; height: 500px;
    top: 35%; left: 30%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(255, 247, 141, 0.08) 0%, rgba(255, 191, 0, 0.02) 45%, transparent 65%);
    animation: drift-3 35s ease-in-out infinite;
    filter: blur(70px);
    will-change: transform;
  }

  @keyframes drift-1 {
    0%,100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(60px, 40px) scale(1.08); }
  }
  @keyframes drift-2 {
    0%,100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(-80px, -60px) scale(1.1); }
  }
  @keyframes drift-3 {
    0%,100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-45%, -55%) scale(0.95); }
  }

  /* --- Dynamic Fireflies --- */
  @keyframes firefly-1 {
    0%   { transform: translate(0,0); opacity: 0; }
    15%  { opacity: 0.8; }
    40%  { transform: translate(-50px, -80px); }
    70%  { transform: translate(-80px, -140px); opacity: 0.5; }
    100% { transform: translate(-20px, -220px); opacity: 0; }
  }
  @keyframes firefly-2 {
    0%   { transform: translate(0,0); opacity: 0; }
    20%  { opacity: 0.7; }
    50%  { transform: translate(60px, -90px); }
    80%  { transform: translate(30px, -160px); opacity: 0.4; }
    100% { transform: translate(70px, -230px); opacity: 0; }
  }

  /* --- Glassmorphic Card --- */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 48px 36px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    max-width: 450px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    margin-bottom: 24px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-soft);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .org-name {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.05em;
    color: #fff;
    opacity: 0.95;
  }

  .divider {
    width: 50px;
    height: 1.5px;
    background: var(--gold-soft);
    margin: 20px auto;
    opacity: 0.5;
  }

  h1.title {
    font-family: 'Cormorant Infant', serif;
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  p.subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.65);
    letter-spacing: 0.02em;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .btn {
    display: inline-block;
    padding: 15px 36px;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--gold-soft) 0%, #c99c1d 100%);
    color: #1c150c;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    text-decoration: none;
    letter-spacing: 1.5px;
    box-shadow: 0 8px 25px rgba(255, 191, 0, 0.25);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(255, 191, 0, 0.45);
    background: linear-gradient(135deg, #ffd700 0%, var(--gold-soft) 100%);
  }
  .btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="noise-overlay" aria-hidden="true"></div>

<div class="aurora-container" aria-hidden="true">
  <div class="aurora-orb-1"></div>
  <div class="aurora-orb-2"></div>
  <div class="aurora-orb-3"></div>
</div>

<main class="card">
  <div class="logo-area">
    <div class="eyebrow">MALAYSIA</div>
    <div class="org-name">JAY IBRAHIM AL ISLAM</div>
  </div>
  
  <div class="divider"></div>
  
  <h1 class="title">Majlis Santapan Malam</h1>
  <p class="subtitle">Kesyukuran &amp; Istiqamah Haji 1447H / 2026M</p>
  
  <a class="btn" href="/dinner">Semak &amp; Hantar RSVP</a>
</main>

<script>
  // --- Dynamic Fireflies Spawner ---
  (function spawnFireflies() {
    const count = 12;
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      const size = Math.random() * 2 + 1;
      const path = Math.random() > 0.5 ? 'firefly-1' : 'firefly-2';
      const duration = (Math.random() * 6 + 6).toFixed(1) + 's';
      const delay = (Math.random() * 10).toFixed(1) + 's';

      dot.style.cssText = `
        position: fixed;
        width: ${size}px;
        height: ${size}px;
        left: ${(Math.random() * 95).toFixed(1)}vw;
        top: ${(Math.random() * 85 + 5).toFixed(1)}vh;
        border-radius: 50%;
        background: rgba(255, 247, 141, 0.85);
        box-shadow: 0 0 ${(size * 2).toFixed(0)}px ${size.toFixed(0)}px rgba(255,191,0,0.5);
        pointer-events: none;
        z-index: 1;
        animation: ${path} ${duration} ${delay} ease-in-out infinite;
        will-change: transform, opacity;
      `;
      document.body.appendChild(dot);
    }
  })();
</script>
</body>
</html>
